<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GetMeOut - Soporte / Support</title>
    <meta name="description" content="GetMeOut App - Página de soporte y política de privacidad / Support page and privacy policy">
    <link rel="icon" type="image/png" href="icon.png">
    
    <!-- Premium Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Liquid Background Elements -->
    <div class="liquid-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
        <svg style="display: none;">
            <filter id="noise">
                <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" />
                <feColorMatrix type="saturate" values="0" />
                <feComponentTransfer>
                    <feFuncR type="linear" slope="0.15" />
                    <feFuncG type="linear" slope="0.15" />
                    <feFuncB type="linear" slope="0.15" />
                </feComponentTransfer>
            </filter>
        </svg>
        <div class="noise-overlay"></div>
    </div>

    <!-- Language Toggle -->
    <div class="lang-toggle">
        <button id="btn-es" class="lang-btn active" onclick="setLang('es')">ES</button>
        <button id="btn-en" class="lang-btn" onclick="setLang('en')">EN</button>
    </div>

    <main class="glass-perspective">
        <!-- Hero -->
        <header class="hero">
            <div class="container">
                <div class="icon-wrapper">
                    <img src="icon.png" alt="GetMeOut App Icon" class="app-icon">
                    <div class="icon-shine"></div>
                </div>
                <h1>GetMeOut</h1>
                <p class="tagline" data-es="Tu Escape Profesional de Bolsillo" data-en="Your Professional Pocket Escape"></p>
                <div class="hero-actions">
                    <a href="https://apps.apple.com/app/getmeout" class="download-btn premium">
                        <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
                        <span data-es="App Store" data-en="App Store"></span>
                    </a>
                </div>
            </div>
        </header>

        <!-- Features -->
        <section class="features" id="features">
            <div class="container">
                <h2 class="section-title" data-es="Características" data-en="Features"></h2>
                <div class="features-grid">
                    <div class="feature-card glass">
                        <div class="feature-icon">🧠</div>
                        <h3 data-es="Coartadas Inteligentes" data-en="Smart Alibis"></h3>
                        <p data-es="Generador profesional con cálculo de credibilidad en tiempo real para situaciones críticas." data-en="Professional generator with real-time credibility scoring for critical situations."></p>
                    </div>
                    <div class="feature-card glass">
                        <div class="feature-icon">📞</div>
                        <h3 data-es="Fake Call Liquid" data-en="Liquid Fake Call"></h3>
                        <p data-es="Simulación ultra-realista con estética iOS 26, haptics de sistema y cronómetro dinámico." data-en="Ultra-realistic simulation with iOS 26 aesthetics, system haptics, and dynamic timer."></p>
                    </div>
                    <div class="feature-card glass">
                        <div class="feature-icon">🎨</div>
                        <h3 data-es="Social Evidence" data-en="Social Evidence"></h3>
                        <p data-es="Crea evidencias visuales con 21 temas premium listos para compartir en redes sociales." data-en="Create visual evidence with 21 premium themes ready to share on social media."></p>
                    </div>
                </div>
            </div>
        </section>

        <!-- Support -->
        <section class="support" id="support">
            <div class="container">
                <div class="support-grid">
                    <div class="support-info glass">
                        <h2 data-es="Centro de Ayuda" data-en="Help Center"></h2>
                        <p data-es="Diseñado para ser intuitivo y discreto. Si necesitas ayuda técnica o tienes sugerencias para nuevas coartadas, estamos aquí." data-en="Designed to be intuitive and discreet. If you need technical help or have suggestions for new alibis, we're here."></p>
                        <div class="contact-pill">
                            <span class="label" data-es="Soporte Directo" data-en="Direct Support"></span>
                            <a href="mailto:jcaboroca@gmail.com" class="email">jcaboroca@gmail.com</a>
                        </div>
                    </div>
                    <div class="faq glass">
                        <h3 data-es="FAQ" data-en="FAQ"></h3>
                        <details>
                            <summary data-es="¿Funciona sin conexión?" data-en="Does it work offline?"></summary>
                            <p data-es="Sí. Toda la generación de excusas y evidencias ocurre 'on-device' para máxima privacidad." data-en="Yes. All excuse and evidence generation happens 'on-device' for maximum privacy."></p>
                        </details>
                        <details>
                            <summary data-es="¿Es compatible con mi iPhone?" data-en="Is it compatible with my iPhone?"></summary>
                            <p data-es="Requiere iOS 26.0+. Aprovecha al máximo los nuevos efectos Liquid Glass del sistema." data-en="Requires iOS 26.0+. It takes full advantage of the new system Liquid Glass effects."></p>
                        </details>
                    </div>
                </div>
            </div>
        </section>

        <!-- Privacy Policy -->
        <section class="privacy" id="privacy">
            <div class="container">
                <div class="privacy-header">
                    <h2 data-es="Privacidad Total" data-en="Total Privacy"></h2>
                    <p class="privacy-date" data-es="Actualizado: 27 Mar 2026" data-en="Updated: Mar 27, 2026"></p>
                </div>
                <div class="privacy-glass-card">
                    <div class="privacy-section">
                        <h3 data-es="Cero Recopilación" data-en="Zero Collection"></h3>
                        <p data-es="GetMeOut NO recopila, almacena ni transmite ningún dato. Lo que sucede en la app, se queda en la app." data-en="GetMeOut does NOT collect, store, or transmit any data. What happens in the app, stays in the app."></p>
                    </div>
                    <div class="privacy-section">
                        <h3 data-es="Permisos Transparentes" data-en="Transparent Permissions"></h3>
                        <p data-es="Utilizamos haptics para realismo y acceso a fotos solo si decides guardar una evidencia." data-en="We use haptics for realism and photo access only if you choose to save evidence."></p>
                    </div>
                    <div class="privacy-section">
                        <h3 data-es="Seguridad por Diseño" data-en="Security by Design"></h3>
                        <p data-es="Al ser 100% offline, tus 'excusas' están seguras de cualquier filtración de datos externas." data-en="Being 100% offline, your 'excuses' are safe from any external data leaks."></p>
                    </div>
                </div>
            </div>
        </section>

        <!-- Footer -->
        <footer>
            <div class="container">
                <div class="footer-content">
                    <div class="footer-brand">
                        <span class="logo">GetMeOut</span>
                        <p>© 2026 Juan Carlos Aborocá</p>
                    </div>
                    <div class="footer-tagline" data-es="A veces solo necesitas... irse de paseo con Riggs. 🐶" data-en="Sometimes you just need... to go for a walk with Riggs. 🐶"></div>
                </div>
            </div>
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
